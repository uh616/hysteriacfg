name: Update Hysteria2 Configs

on:
  schedule:
    # Запускается каждый час
    - cron: '0 * * * *'
  workflow_dispatch:  # Позволяет запускать вручную
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Hysteria2 Checker
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPO_NAME: ${{ github.repository }}
        GITHUB_BRANCH: main
      run: |
        python hysteria_checker.py
        
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add subscription.txt README.md || true
        git diff --staged --quiet || git commit -m "🔄 Автоматическое обновление конфигов: $(date +'%Y-%m-%d %H:%M:%S')"
        git push

