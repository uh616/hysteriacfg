name: Update Hysteria2 Configs

on:
  schedule:
    # Запускается каждый час
    - cron: '0 * * * *'
  workflow_dispatch:  # Позволяет запускать вручную
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Необходимо для коммита и пуша
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0  # Полная история для правильного rebase
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Hysteria2 Checker
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPO_NAME: ${{ github.repository }}
        GITHUB_BRANCH: main
      run: |
        python hysteria_checker.py
        
    - name: Commit and push if changed
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Получаем последние изменения из репозитория
        git fetch origin main || true
        git pull origin main --rebase || git pull origin main || true
        
        # Добавляем изменения
        git add subscription.txt README.md || true
        
        # Коммитим только если есть изменения
        if ! git diff --staged --quiet; then
          git commit -m "🔄 Автоматическое обновление конфигов: $(date +'%Y-%m-%d %H:%M:%S')"
          
          # Пробуем push с rebase если нужно
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || \
          (git pull origin main --rebase && git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main)
        else
          echo "Нет изменений для коммита"
        fi

