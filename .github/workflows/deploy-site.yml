name: Deploy Site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'style.css'
      - 'script.js'
      - 'rebornsite.jpg'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          exclude: |
            .git
            .github
            venv
            results
            *.py
            requirements.txt
            README.md
            hysteria2
            vless
            vmess
            shadowsocks
            trojan
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

